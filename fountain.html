<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🎵 音乐喷泉可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #010105 0%, #0a0a18 40%, #0d0d25 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: fixed;
            touch-action: none;
            overscroll-behavior: none;
        }

        /* 防止微信橡皮筋效果 */
        body::-webkit-scrollbar {
            display: none;
        }

        #fileInput {
            display: none;
        }

        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            pointer-events: none;
            z-index: 0;
        }

        .city-skyline {
            position: absolute;
            bottom: 40vh;
            left: 0;
            width: 100%;
            height: 25vh;
            opacity: 0.5;
            filter: blur(1px);
            z-index: 1;
            pointer-events: none;
        }

        .building {
            position: absolute;
            bottom: 0;
            clip-path: polygon(15% 0, 85% 0, 100% 100%, 0% 100%);
        }

        .control-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: rgba(8, 8, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(80, 180, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 100, 200, 0.3);
            min-width: 300px;
            max-width: 90vw;
            transition: all 0.3s;
        }

        .control-panel.playing {
            border-color: rgba(80, 200, 255, 0.8);
            box-shadow: 0 8px 60px rgba(0, 180, 255, 0.5);
        }

        .main-controls {
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
            z-index: 2;
        }

        .file-btn {
            position: relative;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(40, 40, 90, 0.9), rgba(25, 25, 70, 0.9));
            border-radius: 25px;
            border: 2px solid rgba(100, 200, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            color: white;
            user-select: none;
        }

        .file-btn:active {
            transform: scale(0.95);
            background: rgba(60, 60, 120, 0.9);
            border-color: rgba(100, 200, 255, 0.8);
        }

        .btn-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .btn-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .file-name {
            color: #aaa;
            font-size: 11px;
            margin-top: 4px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .play-btn {
            position: relative;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .play-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .play-btn:active {
            transform: scale(0.9);
        }

        .btn-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00ddff;
            border-right-color: rgba(100, 200, 255, 0.6);
            animation: rotate 4s linear infinite;
        }

        .play-btn.active .btn-ring {
            border-color: rgba(255, 60, 120, 0.4);
            border-top-color: #ff4488;
            animation-duration: 1.2s;
        }

        .btn-inner {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00aaff, #0066ee);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.6);
            transition: all 0.3s;
            position: relative;
            z-index: 2;
        }

        .play-btn.active .btn-inner {
            background: linear-gradient(135deg, #ff4488, #cc0066);
            box-shadow: 0 0 35px rgba(255, 68, 136, 0.7);
        }

        .play-icon {
            color: #fff;
            font-size: 18px;
            margin-left: 2px;
        }

        .status-text {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 5px;
            max-width: 260px;
            text-align: center;
            word-break: break-all;
            line-height: 1.4;
        }

        .status-text.info {
            background: rgba(0, 0, 0, 0.6);
            color: #00ff00;
        }

        .status-text.error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .status-text.tip {
            background: rgba(255, 200, 0, 0.15);
            color: #ffaa00;
            border: 1px solid rgba(255, 200, 0, 0.3);
        }

        .audio-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .freq-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 35px;
        }

        .freq-bar {
            width: 5px;
            background: linear-gradient(to top, #00ffff, #ff66ff);
            border-radius: 2.5px;
            transition: height 0.05s ease;
        }

        .beat-indicator {
            padding: 5px 10px;
            background: rgba(255, 60, 120, 0.2);
            border: 1px solid rgba(255, 60, 120, 0.5);
            border-radius: 12px;
            color: #ff4488;
            font-size: 11px;
            font-weight: bold;
            opacity: 0.3;
            transition: all 0.08s;
        }

        .beat-indicator.beat {
            opacity: 1;
            transform: scale(1.1);
            background: rgba(255, 60, 120, 0.9);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 68, 136, 0.8);
        }

        .scene-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            perspective: 800px;
            z-index: 10;
        }

        .water-surface {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, 
                rgba(0, 80, 160, 0.3) 0%, 
                rgba(0, 40, 120, 0.6) 50%,
                rgba(0, 20, 80, 0.9) 100%
            );
            overflow: hidden;
            z-index: 5;
        }

        .water-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200%;
            height: 200%;
            border: 2px solid rgba(80, 180, 255, 0.3);
            border-radius: 50%;
            animation: ripple 3.5s ease-out infinite;
        }

        .fountain-array {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        .jet-wrapper {
            position: absolute;
            bottom: 0;
            width: 35px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
        }

        .water-stream {
            position: absolute;
            bottom: 0;
            border-radius: 6px 6px 0 0;
            transition: all 0.08s ease;
            filter: blur(1px);
            transform-origin: bottom center;
        }

        .water-core {
            position: absolute;
            bottom: 0;
            border-radius: 4px 4px 0 0;
            filter: blur(2px);
            transition: all 0.08s ease;
            transform-origin: bottom center;
        }

        .splash-burst {
            position: absolute;
            width: 50px;
            height: 50px;
            left: 50%;
            margin-left: -25px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            pointer-events: none;
        }

        .splash-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            filter: blur(2px);
        }

        .mist-cloud {
            position: absolute;
            width: 40px;
            left: 50%;
            margin-left: -20px;
            border-radius: 50%;
            filter: blur(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .base-glow {
            position: absolute;
            bottom: -4px;
            width: 20px;
            height: 10px;
            border-radius: 50%;
            filter: blur(5px);
            transition: all 0.1s ease;
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .start-overlay.hidden {
            display: none;
        }

        .start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00aaff, #0066ee);
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            color: white;
            box-shadow: 0 0 30px rgba(0,170,255,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="start-overlay" id="startOverlay">
        <h2>🎵 音乐喷泉可视化</h2>
        <p style="margin-top: 10px; opacity: 0.8; font-size: 14px;">选择本地音乐文件，观看随节奏舞动的喷泉</p>
        <button class="start-btn" id="startBtn">点击开始体验</button>
        <p style="margin-top: 15px; font-size: 12px; opacity: 0.6;">支持 MP3, WAV, M4A 格式</p>
    </div>

    <canvas id="starCanvas"></canvas>
    <div class="city-skyline" id="citySkyline"></div>

    <div class="control-panel" id="controlPanel">
        <div class="main-controls">
            <div class="file-btn" id="fileBtn">
                <div class="btn-icon">🎵</div>
                <div class="btn-text" id="fileBtnText">选择音乐</div>
                <div class="file-name" id="fileName"></div>
            </div>
            
            <div class="play-btn disabled" id="playBtn">
                <div class="btn-ring"></div>
                <div class="btn-inner">
                    <div class="play-icon" id="playIcon">▶</div>
                </div>
            </div>
        </div>

        <div class="status-text info" id="statusText" style="display: none;"></div>

        <div class="audio-info" id="audioInfo" style="display: none;">
            <div class="freq-bars" id="freqBars"></div>
            <div class="beat-indicator" id="beatIndicator">BEAT</div>
        </div>
    </div>

    <div class="scene-container">
        <div class="water-surface">
            <div class="water-ripple" style="animation-delay: 0s"></div>
            <div class="water-ripple" style="animation-delay: 0.6s"></div>
            <div class="water-ripple" style="animation-delay: 1.2s"></div>
            <div class="water-ripple" style="animation-delay: 1.8s"></div>
            <div class="water-ripple" style="animation-delay: 2.4s"></div>
        </div>
        <div class="fountain-array" id="fountainArray"></div>
    </div>

    <input type="file" id="fileInput" accept="audio/mp3,audio/wav,audio/m4a,audio/aac,audio/*">

    <script>
        const JET_COUNT = 20;
        const MAX_HEIGHT = 220;
        const SMOOTHING = 0.1;

        let isPlaying = false;
        let isLoading = false;
        let musicFile = null;
        let audioContext = null;
        let analyser = null;
        let sourceNode = null;
        let dataArray = null;
        let audioBuffer = null;
        let animationFrame = null;
        let beatTimer = null;
        let hueRotation = 0;
        let bassLevel = 0;
        let lastBass = 0;
        let isBeat = false;

        const jets = [];
        const freqBars = [];

        // DOM
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');
        const fileInput = document.getElementById('fileInput');
        const fileBtn = document.getElementById('fileBtn');
        const fileBtnText = document.getElementById('fileBtnText');
        const fileName = document.getElementById('fileName');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const controlPanel = document.getElementById('controlPanel');
        const statusText = document.getElementById('statusText');
        const audioInfo = document.getElementById('audioInfo');
        const freqBarsContainer = document.getElementById('freqBars');
        const beatIndicator = document.getElementById('beatIndicator');
        const fountainArray = document.getElementById('fountainArray');
        const starCanvas = document.getElementById('starCanvas');

        function showStatus(msg, type = 'info') {
            statusText.textContent = msg;
            statusText.className = `status-text ${type}`;
            statusText.style.display = 'block';
            if (type === 'info') {
                setTimeout(() => { if (!isPlaying) statusText.style.display = 'none'; }, 3000);
            }
        }

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        startBtn.addEventListener('click', () => {
            initAudioContext();
            startOverlay.classList.add('hidden');
        });

        function init() {
            initStarCanvas();
            initCity();
            initFountain();
            initFreqBars();
            
            fileBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFile);
            playBtn.addEventListener('click', togglePlay);
            
            window.addEventListener('resize', initStarCanvas);
        }

        function initStarCanvas() {
            const ctx = starCanvas.getContext('2d');
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight * 0.6;
            ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            
            for (let i = 0; i < 150; i++) {
                const x = Math.random() * starCanvas.width;
                const y = Math.random() * starCanvas.height;
                const size = Math.random() * 1.5 + 0.5;
                const opacity = Math.random() * 0.8 + 0.2;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fill();
            }
        }

        function initCity() {
            const city = document.getElementById('citySkyline');
            city.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const b = document.createElement('div');
                b.className = 'building';
                b.style.cssText = `height: ${12 + Math.random() * 18}vh; width: ${3 + Math.random() * 4}vw; left: ${(i / 12) * 100}vw; background: linear-gradient(to top, #080818, #151530 ${40 + Math.random() * 40}%);`;
                city.appendChild(b);
            }
        }

        function initFountain() {
            for (let i = 0; i < JET_COUNT; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'jet-wrapper';
                wrap.style.left = `${(i / (JET_COUNT - 1)) * 85 + 7.5}%`;
                
                const stream = document.createElement('div');
                stream.className = 'water-stream';
                stream.id = `s-${i}`;
                
                const core = document.createElement('div');
                core.className = 'water-core';
                core.id = `c-${i}`;
                
                const splash = document.createElement('div');
                splash.className = 'splash-burst';
                splash.id = `sp-${i}`;
                for (let n = 0; n < 8; n++) {
                    const p = document.createElement('div');
                    p.className = 'splash-particle';
                    p.style.transform = `rotate(${(n / 8) * 360}deg) translateX(15px)`;
                    splash.appendChild(p);
                }
                
                const mist = document.createElement('div');
                mist.className = 'mist-cloud';
                mist.id = `m-${i}`;
                
                const glow = document.createElement('div');
                glow.className = 'base-glow';
                glow.id = `g-${i}`;
                
                wrap.append(stream, core, splash, mist, glow);
                fountainArray.appendChild(wrap);
                
                jets.push({ index: i, currentHeight: 0, targetHeight: 0, velocity: 0, color: '', colorLight: '', width: 12 + Math.random() * 10 });
            }
        }

        function initFreqBars() {
            for (let i = 0; i < 16; i++) {
                const bar = document.createElement('div');
                bar.className = 'freq-bar';
                freqBarsContainer.appendChild(bar);
                freqBars.push(bar);
            }
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (isPlaying) pause();
            
            musicFile = file;
            fileBtnText.textContent = '更换音乐';
            fileName.textContent = file.name;
            playBtn.classList.remove('disabled');
            audioBuffer = null;
            showStatus('已加载: ' + file.name);
        }

        function pause() {
            if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
            if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
            if (animationFrame) { cancelAnimationFrame(animationFrame); animationFrame = null; }
            
            isPlaying = false;
            playIcon.textContent = '▶';
            playBtn.classList.remove('active');
            controlPanel.classList.remove('playing');
            audioInfo.style.display = 'none';
            
            jets.forEach(j => { j.targetHeight = 0; j.currentHeight = 0; });
            updateVisuals();
        }

        async function togglePlay() {
            if (!musicFile) { showStatus('请先选择音乐', 'error'); return; }
            if (isPlaying) { pause(); return; }
            
            isLoading = true;
            showStatus('准备播放...', 'info');
            
            try {
                initAudioContext();
                
                if (!analyser) {
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = 0.8;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                
                if (!audioBuffer) {
                    const ab = await musicFile.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(ab);
                }
                
                sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = audioBuffer;
                sourceNode.loop = true;
                sourceNode.connect(analyser);
                analyser.connect(audioContext.destination);
                sourceNode.start(0);
                
                isPlaying = true;
                isLoading = false;
                playIcon.textContent = '⏸';
                playBtn.classList.add('active');
                controlPanel.classList.add('playing');
                audioInfo.style.display = 'flex';
                statusText.style.display = 'none';
                
                startAnalyze();
                
                beatTimer = setInterval(() => {
                    if (bassLevel > 0.55 && bassLevel > lastBass * 1.15) {
                        isBeat = true;
                        beatIndicator.classList.add('beat');
                        setTimeout(() => { isBeat = false; beatIndicator.classList.remove('beat'); }, 120);
                    }
                    lastBass = bassLevel;
                }, 50);
                
            } catch (err) {
                showStatus('播放失败: ' + err.message, 'error');
                isLoading = false;
            }
        }

        function startAnalyze() {
            const loop = () => {
                if (!isPlaying) return;
                analyser.getByteFrequencyData(dataArray);
                
                for (let i = 0; i < 16; i++) {
                    const idx = Math.floor(i * dataArray.length / 16);
                    freqBars[i].style.height = ((dataArray[idx] || 0) / 255 * 100) + '%';
                }
                
                const bassEnd = Math.floor(dataArray.length * 0.1);
                bassLevel = getAvg(dataArray, 0, bassEnd) / 255;
                
                updateFountains();
                hueRotation = (hueRotation + 0.8) % 360;
                animationFrame = requestAnimationFrame(loop);
            };
            loop();
        }

        function updateFountains() {
            jets.forEach((jet, i) => {
                const idx = Math.floor((i / JET_COUNT) * dataArray.length * 0.6);
                const val = dataArray[idx] || 0;
                const wave = Math.sin(Date.now() / 400 + i * 0.4) * 0.25 + 1;
                let target = (val / 255) * MAX_HEIGHT * wave;
                
                const dist = Math.abs(i - JET_COUNT / 2) / (JET_COUNT / 2);
                if (dist < 0.5) target += bassLevel * 70 * (1 - dist);
                
                jet.velocity = (target - jet.currentHeight) * SMOOTHING;
                jet.currentHeight += jet.velocity;
                
                const hue = (hueRotation + i * 10) % 360;
                jet.color = `hsla(${hue}, 85%, 55%, 0.9)`;
                jet.colorLight = `hsla(${hue}, 90%, 75%, 0.7)`;
            });
            updateVisuals();
        }

        function updateVisuals() {
            jets.forEach((jet, i) => {
                const h = jet.currentHeight;
                const w = jet.width;
                const s = document.getElementById(`s-${i}`);
                const c = document.getElementById(`c-${i}`);
                const sp = document.getElementById(`sp-${i}`);
                const m = document.getElementById(`m-${i}`);
                const g = document.getElementById(`g-${i}`);
                
                if (s) {
                    s.style.height = h + 'px';
                    s.style.width = w + 'px';
                    s.style.background = `linear-gradient(to top, ${jet.color} 0%, ${jet.colorLight} 60%, transparent 100%)`;
                    s.style.opacity = h > 5 ? 0.9 : 0;
                }
                if (c) {
                    c.style.height = (h * 0.7) + 'px';
                    c.style.width = (w * 0.3) + 'px';
                    c.style.background = `linear-gradient(to top, rgba(255,255,255,0.9), ${jet.colorLight})`;
                    c.style.boxShadow = `0 0 ${12 + bassLevel * 20}px ${jet.color}`;
                    c.style.opacity = h > 10 ? 0.8 : 0;
                }
                if (sp) {
                    sp.style.bottom = h + 'px';
                    sp.style.transform = `scale(${0.4 + (h / MAX_HEIGHT) * 1.2})`;
                    sp.style.opacity = h > 15 ? Math.min((h - 15) / 80, 1) : 0;
                    Array.from(sp.children).forEach(p => {
                        p.style.background = jet.colorLight;
                        p.style.opacity = (h / MAX_HEIGHT) * 0.7;
                    });
                }
                if (m) {
                    m.style.bottom = (h * 0.2) + 'px';
                    m.style.height = (h * 0.5) + 'px';
                    m.style.opacity = (h / MAX_HEIGHT) * 0.3;
                    m.style.background = `radial-gradient(ellipse at center, ${jet.colorLight} 0%, transparent 70%)`;
                }
                if (g) {
                    const int = h / MAX_HEIGHT;
                    g.style.boxShadow = `0 0 ${20 + int * 30}px ${12 + int * 20}px ${jet.color}`;
                    g.style.opacity = 0.5 + int * 0.5;
                    g.style.background = jet.color;
                }
            });
        }

        function getAvg(arr, s, e) {
            let sum = 0;
            for (let i = s; i < e; i++) sum += arr[i];
            return sum / (e - s);
        }

        init();
    </script>
</body>
</html>
