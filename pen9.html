<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>音乐喷泉 · 20柱星空版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #010105, #0a0a2a);
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: auto;
        }
        button {
            background: #2b85e4;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
        }
        #fileBtn {
            background: #ff8c00;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="controls">
    <button id="fileBtn">🎵 选择音乐</button>
    <button id="playBtn" disabled>▶ 播放</button>
</div>

<input type="file" id="fileInput" accept="audio/mp3,audio/wav,audio/m4a,audio/aac" style="display:none">

<script>
    // ================== 配置 ==================
    const TOTAL_SLOTS = 20;
    const ACTIVE_COUNT = 20;
    const MAX_HEIGHT = 240;
    const activeIndices = Array.from({length: 20}, (_, i) => i);
    const PARTICLE_POOL_SIZE = 120;

    // ================== 全局变量 ==================
    let isPlaying = false;
    let musicFile = null;
    let audioCtx = null;
    let sourceNode = null;
    let analyser = null;
    let dataArray = null;
    let startTime = 0;

    const canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let canvasWidth, canvasHeight;

    let stars = [];
    let buildings = [];
    let particlePool = [];
    let activeParticles = 0;

    let jetHeights = new Array(ACTIVE_COUNT).fill(0);
    let targetHeights = new Array(ACTIVE_COUNT).fill(0);
    let bassValue = 0;
    let time = 0;

    const SMOOTH = 0.18;

    // ================== 初始化 ==================
    function initScene() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        const isMobile = canvasWidth < 768;
        const starCount = isMobile ? 200 : 400;
        
        stars = [];
        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * canvasWidth,
                y: Math.random() * canvasHeight * 0.7,
                r: Math.random() * 1.5 + 0.2,
                alpha: Math.random() * 0.8 + 0.2,
                twinkle: Math.random() * Math.PI * 2,
                twinkleSpeed: 0.02 + Math.random() * 0.05,
                color: Math.random() > 0.8 ? '200,220,255' : '255,255,255'
            });
        }

        buildings = [];
        const buildingCount = Math.floor(canvasWidth / 70) + 3;
        for (let i = 0; i < buildingCount; i++) {
            buildings.push({
                x: (i / buildingCount) * canvasWidth,
                width: 4 + Math.random() * 8,
                height: 8 + Math.random() * 30,
                color: `rgba(20,30,60,${0.4 + Math.random()*0.4})`,
            });
        }

        particlePool = [];
        for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
            particlePool.push({
                x: 0, y: 0, vx: 0, vy: 0, life: 0, size: 0, active: false
            });
        }
    }

    function drawStars() {
        for (let s of stars) {
            const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkle) * 0.3 + 0.7;
            const alpha = s.alpha * twinkle;
            
            ctx.globalAlpha = alpha;
            ctx.fillStyle = `rgb(${s.color})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fill();
            
            if (s.r > 1 && alpha > 0.6) {
                ctx.strokeStyle = `rgba(${s.color},${alpha * 0.5})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(s.x - s.r*2, s.y);
                ctx.lineTo(s.x + s.r*2, s.y);
                ctx.moveTo(s.x, s.y - s.r*2);
                ctx.lineTo(s.x, s.y + s.r*2);
                ctx.stroke();
            }
        }
        ctx.globalAlpha = 1;
    }

    function drawCity() {
        const groundY = canvasHeight * 0.65;
        for (let b of buildings) {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, groundY - b.height, b.width, b.height);
        }
    }

    function drawWater() {
        const waterY = canvasHeight * 0.68;
        ctx.fillStyle = "rgba(0,30,70,0.6)";
        ctx.fillRect(0, waterY, canvasWidth, canvasHeight - waterY);
        
        ctx.fillStyle = "rgba(100,200,255,0.1)";
        for (let i = 0; i < 3; i++) {
            const offset = Math.sin(time * 0.001 + i) * 5;
            ctx.fillRect(0, waterY + offset + i * 3, canvasWidth, 1);
        }
    }

    function drawFountains() {
        const waterY = canvasHeight * 0.68;
        const slotWidth = canvasWidth / (TOTAL_SLOTS + 1);
        
        for (let i = 0; i < ACTIVE_COUNT; i++) {
            const height = Math.min(MAX_HEIGHT, jetHeights[i] * MAX_HEIGHT / 255);
            if (height < 2) continue;
            
            const slotIndex = activeIndices[i];
            const centerX = slotWidth * (slotIndex + 1);
            const hue = (time * 0.02 + i * 18) % 360;
            
            const baseWidth = Math.max(2, slotWidth * 0.18);
            const topWidth = baseWidth * 0.4;
            const topY = waterY - height;
            
            ctx.beginPath();
            ctx.moveTo(centerX - baseWidth/2, waterY);
            ctx.lineTo(centerX + baseWidth/2, waterY);
            ctx.lineTo(centerX + topWidth/2, topY);
            ctx.lineTo(centerX - topWidth/2, topY);
            ctx.closePath();
            
            ctx.fillStyle = `hsla(${hue}, 90%, 65%, 0.9)`;
            ctx.fill();
            
            ctx.fillStyle = `hsla(${hue}, 50%, 95%, 0.8)`;
            ctx.fillRect(centerX - baseWidth/3, topY, baseWidth/1.5, height);
            
            if (height > 30 && jetHeights[i] > 50) {
                const intensity = jetHeights[i] / 255;
                ctx.fillStyle = `hsla(${hue}, 80%, 90%, ${0.9 * intensity})`;
                ctx.beginPath();
                ctx.arc(centerX, topY, 2 * intensity, 0, Math.PI*2);
                ctx.fill();
                
                for (let j = 0; j < 3; j++) {
                    const angle = Math.random() * Math.PI;
                    const dist = 4 + Math.random() * 4;
                    ctx.beginPath();
                    ctx.arc(centerX + Math.cos(angle)*dist, topY - Math.sin(angle)*dist, 1, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
    }

    function updateParticles() {
        const waterY = canvasHeight * 0.68;
        const slotWidth = canvasWidth / (TOTAL_SLOTS + 1);
        
        let spawned = 0;
        if (isPlaying && activeParticles < PARTICLE_POOL_SIZE) {
            for (let i = 0; i < ACTIVE_COUNT; i++) {
                if (spawned >= 3) break;
                
                const height = jetHeights[i] * MAX_HEIGHT / 255;
                const intensity = jetHeights[i] / 255;
                
                if (intensity > 0.5 && Math.random() < 0.025) {
                    for (let p of particlePool) {
                        if (!p.active) {
                            const slotIndex = activeIndices[i];
                            p.x = slotWidth * (slotIndex + 1) + (Math.random() - 0.5) * 6;
                            p.y = waterY - height;
                            p.vx = (Math.random() - 0.5) * 0.6;
                            p.vy = Math.random() * 1;
                            p.life = 0.6 + Math.random() * 0.3;
                            p.size = 0.8 + Math.random() * 1;
                            p.active = true;
                            activeParticles++;
                            spawned++;
                            break;
                        }
                    }
                }
            }
        }
        
        ctx.fillStyle = 'rgba(200,240,255,0.7)';
        for (let p of particlePool) {
            if (!p.active) continue;
            
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15;
            p.life -= 0.012;
            
            if (p.y > canvasHeight || p.life <= 0) {
                p.active = false;
                activeParticles--;
                continue;
            }
            
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function draw() {
        ctx.fillStyle = '#000208';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        const grad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
        grad.addColorStop(0, '#000208');
        grad.addColorStop(0.5, '#0a0a20');
        grad.addColorStop(1, '#0d1525');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        drawStars();
        drawCity();
        drawWater();
        drawFountains();
        updateParticles();
    }

    function animate() {
        time = Date.now();
        
        if (isPlaying && analyser && dataArray) {
            analyser.getByteFrequencyData(dataArray);
            const freqLen = dataArray.length;

            for (let i = 0; i < ACTIVE_COUNT; i++) {
                let tStart = Math.pow(i / ACTIVE_COUNT, 1.15);
                let tEnd = Math.pow((i + 1) / ACTIVE_COUNT, 1.15);
                
                let start = Math.floor(tStart * freqLen * 0.85);
                let end = Math.floor(tEnd * freqLen * 0.85);
                
                if (end <= start) end = start + 1;
                if (end > freqLen) end = freqLen;
                
                let sum = 0;
                for (let j = start; j < end; j++) {
                    sum += dataArray[j];
                }
                targetHeights[i] = sum / (end - start);
            }

            let bassSum = 0;
            const bassEnd = Math.floor(freqLen * 0.12);
            for (let i = 0; i < bassEnd; i++) bassSum += dataArray[i];
            bassValue = bassSum / bassEnd;
            
            for (let i = 0; i < ACTIVE_COUNT; i++) {
                targetHeights[i] = Math.min(255, targetHeights[i] * (1 + bassValue / 300));
            }
        } else {
            for (let i = 0; i < ACTIVE_COUNT; i++) {
                targetHeights[i] = 5 + Math.sin(time * 0.0008 + i * 0.25) * 3;
            }
        }

        for (let i = 0; i < ACTIVE_COUNT; i++) {
            const diff = targetHeights[i] - jetHeights[i];
            jetHeights[i] += diff * SMOOTH;
        }

        draw();
        requestAnimationFrame(animate);
    }

    function onResize() {
        initScene();
    }

    async function startPlayback(file) {
        if (!file) return;
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (sourceNode) {
                try { sourceNode.stop(); } catch(e) {}
                sourceNode = null;
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            if (!analyser) {
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.7;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.loop = true;
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            startTime = audioCtx.currentTime;
            sourceNode.start(0);
            
            isPlaying = true;
            playBtn.textContent = '⏸ 暂停';
            playBtn.disabled = false;
        } catch (err) {
            alert('播放失败：' + err.message);
            isPlaying = false;
            playBtn.textContent = '▶ 播放';
        }
    }

    function stopPlayback() {
        if (sourceNode) {
            try { sourceNode.stop(); } catch(e) {}
            sourceNode = null;
        }
        if (audioCtx) {
            audioCtx.suspend();
        }
        isPlaying = false;
        playBtn.textContent = '▶ 播放';
        for (let i=0; i<ACTIVE_COUNT; i++) {
            targetHeights[i] = 0;
            jetHeights[i] = 0;
        }
    }

    const fileBtn = document.getElementById('fileBtn');
    const playBtn = document.getElementById('playBtn');
    const fileInput = document.getElementById('fileInput');

    fileBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        musicFile = file;
        if (isPlaying) stopPlayback();
        playBtn.disabled = false;
        playBtn.textContent = '▶ 播放';
        fileBtn.textContent = `🎵 ${file.name.length > 10 ? file.name.slice(0,7)+'…' : file.name}`;
    });

    playBtn.addEventListener('click', async () => {
        if (!musicFile) {
            alert('请先选择音乐文件');
            return;
        }
        if (isPlaying) {
            stopPlayback();
        } else {
            await startPlayback(musicFile);
        }
    });

    window.addEventListener('resize', onResize);
    initScene();
    animate();
</script>
</body>
</html>
