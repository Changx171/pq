<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>音乐喷泉 · 专业水景版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 20;
            pointer-events: none;
        }
        button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #fileBtn {
            background: rgba(255,140,0,0.8);
            border-color: rgba(255,160,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="controls">
    <button id="fileBtn">🎵 选择音乐</button>
    <button id="playBtn" disabled>▶ 播放</button>
</div>
<input type="file" id="fileInput" accept="audio/mp3,audio/wav,audio/m4a,audio/aac" style="display:none">

<script>
    // ================== 配置 ==================
    const SLOTS = 10;
    const MAX_HEIGHT = 280;
    // 前后排分层：前排(0-4)低矮，后排(5-9)高大，形成层次感
    const LAYERS = [0.6, 0.7, 0.8, 0.9, 1.0, 0.5, 0.6, 0.7, 0.8, 0.9]; // 高度乘数
    const POSITIONS = [0, 1, 2, 3, 4, 0.5, 1.5, 2.5, 3.5, 4.5]; // 后排插空
    
    const PARTICLE_POOL = 150;
    const MIST_POOL = 80;

    // ================== 全局变量 ==================
    let isPlaying = false, musicFile = null;
    let audioCtx, sourceNode, analyser, dataArray;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let W, H, time = 0;
    
    let stars = [], buildings = [];
    let particles = [], mistParticles = [];
    let heights = [], targets = [];
    let bassEnergy = 0;

    // ================== 初始化 ==================
    function init() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        
        // 星空背景
        stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random()*W, 
                y: Math.random()*H*0.6,
                size: Math.random()*1.5,
                blink: Math.random()*Math.PI,
                speed: 0.02+Math.random()*0.03
            });
        }
        
        // 远景城市剪影（更暗）
        buildings = [];
        let x = 0;
        while(x < W) {
            let w = 20 + Math.random()*40;
            buildings.push({x, w, h: 30 + Math.random()*80});
            x += w + 5;
        }
        
        // 粒子池
        for(let i=0; i<PARTICLE_POOL; i++) particles.push({x:0,y:0,vx:0,vy:0,life:0,active:false});
        for(let i=0; i<MIST_POOL; i++) mistParticles.push({x:0,y:0,vx:0,vy:0,life:0,size:0,active:false});
        
        heights = new Array(SLOTS).fill(0);
        targets = new Array(SLOTS).fill(0);
    }

    // ================== 绘制 ==================
    function draw() {
        // 夜空背景
        let grad = ctx.createLinearGradient(0,0,0,H);
        grad.addColorStop(0, '#02040a');
        grad.addColorStop(0.5, '#0a1428');
        grad.addColorStop(1, '#0d1e3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,W,H);
        
        // 星星
        ctx.fillStyle = 'white';
        stars.forEach(s => {
            let alpha = 0.3 + Math.sin(time*s.speed + s.blink)*0.3;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        
        // 城市剪影
        ctx.fillStyle = '#051020';
        buildings.forEach(b => {
            ctx.fillRect(b.x, H*0.65 - b.h, b.w, b.h);
            // 窗户灯光
            if(Math.random() > 0.98) {
                ctx.fillStyle = 'rgba(255,200,100,0.3)';
                ctx.fillRect(b.x+5, H*0.65-b.h+10, 3, 3);
                ctx.fillStyle = '#051020';
            }
        });
        
        // 水面
        let waterY = H*0.68;
        ctx.fillStyle = 'rgba(0,20,50,0.8)';
        ctx.fillRect(0, waterY, W, H-waterY);
        
        // 水面反光（动态）
        ctx.fillStyle = 'rgba(100,180,255,0.1)';
        for(let i=0; i<5; i++) {
            let y = waterY + Math.sin(time*0.002+i)*3;
            ctx.fillRect(0, y, W, 1);
        }
        
        // 喷泉（后排先画，前排后画，形成遮挡关系）
        drawFountainLayer(waterY, true);  // 后排（高）
        drawFountainLayer(waterY, false); // 前排（低）
        
        // 水雾效果（叠加在最上层）
        drawMist(waterY);
        
        // 水面倒影
        drawReflection(waterY);
    }

    function drawFountainLayer(waterY, isBack) {
        let startIdx = isBack ? 5 : 0;
        let endIdx = isBack ? 10 : 5;
        let slotW = W / 6; // 5根柱子，6个间隔
        
        for(let i=startIdx; i<endIdx; i++) {
            let idx = isBack ? i-5 : i;
            let centerX = slotW * (idx + 1) + (isBack ? slotW*0.5 : 0);
            let layerMul = LAYERS[i];
            let rawH = heights[i] * MAX_HEIGHT / 255 * layerMul;
            let h = Math.min(MAX_HEIGHT * layerMul, rawH);
            
            if(h < 5) continue;
            
            // 颜色：后排冷色（蓝紫），前排暖色（青黄）
            let hue = isBack ? 220 + i*5 : 160 + i*8;
            let sat = 80 + heights[i]/255 * 20;
            let light = 50 + heights[i]/255 * 30;
            
            // 水柱主体（带透明渐变）
            let grad = ctx.createLinearGradient(centerX, waterY, centerX, waterY-h);
            grad.addColorStop(0, `hsla(${hue},${sat}%,${light}%,0.9)`);
            grad.addColorStop(0.6, `hsla(${hue},${sat}%,${light+20}%,0.6)`);
            grad.addColorStop(1, `hsla(${hue},${sat}%,${light+40}%,0.2)`);
            
            let baseW = isBack ? 6 : 8; // 后排更细（远景）
            let topW = baseW * 0.3;
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(centerX-baseW, waterY);
            ctx.lineTo(centerX+baseW, waterY);
            ctx.lineTo(centerX+topW, waterY-h);
            ctx.lineTo(centerX-topW, waterY-h);
            ctx.closePath();
            ctx.fill();
            
            // 核心高光（模拟水下LED照射）
            ctx.fillStyle = `hsla(${hue},60%,90%,${0.3+heights[i]/255*0.4})`;
            ctx.fillRect(centerX-baseW*0.3, waterY-h, baseW*0.6, h);
            
            // 底部光晕（水下灯光）
            let glow = ctx.createRadialGradient(centerX, waterY, 0, centerX, waterY, baseW*3);
            glow.addColorStop(0, `hsla(${hue},80%,60%,0.6)`);
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(centerX-baseW*3, waterY-baseW*3, baseW*6, baseW*6);
            
            // 顶部水花（高强度时）
            if(heights[i] > 150) {
                drawSplash(centerX, waterY-h, hue, heights[i]/255);
            }
            
            // 生成水雾
            if(heights[i] > 100 && Math.random() < 0.1) {
                spawnMist(centerX, waterY-h*0.7);
            }
        }
    }

    function drawSplash(x, y, hue, intensity) {
        ctx.fillStyle = `hsla(${hue},70%,90%,${intensity})`;
        // 冠状水花
        for(let i=0; i<8; i++) {
            let angle = -Math.PI/2 + (i-3.5)*0.3;
            let r = 5 + Math.random()*5;
            let px = x + Math.cos(angle)*r;
            let py = y + Math.sin(angle)*r*0.5;
            ctx.beginPath();
            ctx.arc(px, py, 1.5, 0, Math.PI*2);
            ctx.fill();
        }
        // 中心亮点
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI*2);
        ctx.fill();
    }

    function spawnMist(x, y) {
        for(let p of mistParticles) {
            if(!p.active) {
                p.x = x + (Math.random()-0.5)*20;
                p.y = y;
                p.vx = (Math.random()-0.5)*0.5;
                p.vy = -Math.random()*0.5;
                p.life = 1;
                p.size = 10 + Math.random()*20;
                p.active = true;
                break;
            }
        }
    }

    function drawMist(waterY) {
        ctx.globalCompositeOperation = 'screen';
        for(let p of mistParticles) {
            if(!p.active) continue;
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.size *= 1.02;
            
            if(p.life <= 0) {
                p.active = false;
                continue;
            }
            
            ctx.fillStyle = `rgba(200,230,255,${p.life*0.15})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
    }

    function drawReflection(waterY) {
        // 简单的倒影效果
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.scale(1, -0.4); // 压扁并翻转
        ctx.translate(0, -waterY*2.5);
        
        let slotW = W/6;
        for(let i=0; i<SLOTS; i++) {
            let isBack = i>=5;
            let idx = isBack ? i-5 : i;
            let centerX = slotW*(idx+1) + (isBack?slotW*0.5:0);
            let h = heights[i]*MAX_HEIGHT/255*LAYERS[i];
            if(h<5) continue;
            
            let hue = isBack ? 220+i*5 : 160+i*8;
            ctx.fillStyle = `hsla(${hue},60%,50%,0.3)`;
            ctx.fillRect(centerX-3, waterY-h, 6, h);
        }
        ctx.restore();
    }

    // ================== 音频分析 ==================
    function animate() {
        time = Date.now();
        
        if(isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            let len = dataArray.length;
            
            // 分析频带：低音给中间，高音给两边，形成对称
            for(let i=0; i<SLOTS; i++) {
                let freqRatio;
                // 对称映射：0↔9, 1↔8, 2↔7, 3↔6, 4↔5 共享相同频段
                let symmetricIdx = i < 5 ? i : 9-i;
                // 低音(0-30%)给中间(2,3,7,8)，高音给两边
                if(symmetricIdx <= 1) freqRatio = 0.3 + symmetricIdx*0.2; // 中高频
                else if(symmetricIdx === 2) freqRatio = 0.1; // 低音
                else freqRatio = 0.05; // 超低音
                
                let start = Math.floor(freqRatio * len);
                let end = Math.floor((freqRatio + 0.1) * len);
                if(end <= start) end = start+1;
                
                let sum = 0;
                for(let j=start; j<end; j++) sum += dataArray[j];
                targets[i] = sum/(end-start);
            }
            
            // 低音整体提升
            let bass = 0;
            for(let i=0; i<len*0.1; i++) bass += dataArray[i];
            bassEnergy = bass/(len*0.1);
            
            for(let i=0; i<SLOTS; i++) {
                targets[i] = Math.min(255, targets[i]*(1+bassEnergy/200));
            }
        } else {
            // 待机动画：波浪形起伏
            for(let i=0; i<SLOTS; i++) {
                targets[i] = 20 + Math.sin(time*0.002 + i*0.5)*15*LAYERS[i];
            }
        }
        
        // 平滑过渡
        for(let i=0; i<SLOTS; i++) {
            heights[i] += (targets[i]-heights[i])*0.15;
        }
        
        draw();
        requestAnimationFrame(animate);
    }

    // ================== 控制 ==================
    async function startPlay(file) {
        if(!file) return;
        try {
            if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
            if(sourceNode) { try{sourceNode.stop();}catch(e){} }
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            
            if(!analyser) {
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512; // 更高精度
                analyser.smoothingTimeConstant = 0.8;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            
            let buffer = await file.arrayBuffer();
            let audioBuffer = await audioCtx.decodeAudioData(buffer);
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.loop = true;
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            sourceNode.start(0);
            
            isPlaying = true;
            playBtn.textContent = '⏸ 暂停';
        } catch(e) {
            alert('播放失败');
        }
    }

    function stopPlay() {
        if(sourceNode) sourceNode.stop();
        isPlaying = false;
        playBtn.textContent = '▶ 播放';
        heights.fill(0);
        targets.fill(0);
    }

    // 事件
    document.getElementById('fileBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => {
        let f = e.target.files[0];
        if(!f) return;
        musicFile = f;
        stopPlay();
        playBtn.disabled = false;
        playBtn.textContent = '▶ 播放';
    };
    document.getElementById('playBtn').onclick = () => {
        if(!musicFile) return alert('请先选择音乐');
        isPlaying ? stopPlay() : startPlay(musicFile);
    };
    window.onresize = init;
    
    init();
    animate();
</script>
</body>
</html>
